<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda | Plaza Real Silao</title>
    <meta name="description" content="Información detallada de la tienda en Plaza Real Silao.">
    <meta name="theme-color" content="#33200F">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" href="/images/icons/icon-192x192.png">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-0SGW9ESY52"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-0SGW9ESY52');</script>

    <link rel="preload" href="/fonts/fraunces-600.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/fonts/inter-400.woff2" as="font" type="font/woff2" crossorigin>
    <style>
      :root{--cream:#F7F2E7;--terracotta:#DD6B4A;--terracotta-dark:#C2563A;--amber:#E89A2D;--espresso:#33200F;--ink:#2A1B0E;--text-muted:#6B5743;--line:rgba(51,32,15,.12);--font-display:"Fraunces",Georgia,serif;--font-body:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;--container:1180px;--header-h:72px;--radius-pill:999px}
      *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
      body{font-family:var(--font-body);line-height:1.6;color:var(--espresso);background:var(--cream);overflow-x:hidden}
      img,svg{display:block;max-width:100%}img{height:auto}
      h1,h2{font-family:var(--font-display);font-weight:600;line-height:1.08;color:var(--ink)}
      .container{width:100%;max-width:var(--container);margin:0 auto;padding:0 1.5rem}
      .navbar{position:sticky;top:0;z-index:100;min-height:var(--header-h);background:rgba(247,242,231,.78)}
      .nav-wrapper{display:flex;align-items:center;justify-content:space-between;min-height:var(--header-h)}
    </style>
    <link rel="preload" href="/css/main.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="/css/main.css"></noscript>
</head>
<body>
    <a href="#main" class="skip-link">Saltar al contenido principal</a>
    <header class="header" id="header"></header>

    <main id="main">
        <section class="store-hero" id="storeHero">
            <div class="container">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li><a href="/">Inicio</a></li>
                        <li><a href="/tiendas/">Tiendas</a></li>
                        <li class="active" id="breadcrumbStore">Tienda</li>
                    </ol>
                </nav>
                <span class="badge" id="storeCategoryBadge"></span>
                <h1 id="storeName">Cargando…</h1>
            </div>
        </section>

        <section class="section store-detail">
            <div class="container">
                <div class="store-detail-grid">
                    <div class="store-detail-media" id="storeMainImage">
                        <img src="" alt="" id="storeImage" width="800" height="600">
                    </div>
                    <div class="store-detail-info">
                        <div id="storeStatus"></div>
                        <h2>Acerca de esta tienda</h2>
                        <p id="storeDescription" class="lead"></p>

                        <div class="info-rows">
                            <div class="info-row"><svg class="ico" aria-hidden="true"><use href="/images/icons/sprite.svg#pin"></use></svg><div><strong>Ubicación</strong><span id="storeLocation"></span></div></div>
                            <div class="info-row"><svg class="ico" aria-hidden="true"><use href="/images/icons/sprite.svg#clock"></use></svg><div><strong>Horario</strong><span id="storeHours"></span></div></div>
                            <div class="info-row"><svg class="ico" aria-hidden="true"><use href="/images/icons/sprite.svg#phone"></use></svg><div><strong>Teléfono</strong><span id="storePhone"></span></div></div>
                            <div class="info-row"><svg class="ico" aria-hidden="true"><use href="/images/icons/sprite.svg#mail"></use></svg><div><strong>Email</strong><span id="storeEmail"></span></div></div>
                        </div>

                        <h3 id="servicesTitle">Servicios disponibles</h3>
                        <ul id="storeServices" class="services-list"></ul>

                        <div class="store-actions">
                            <a href="#" class="btn btn-primary" id="contactStore"></a>
                            <a href="/tiendas/" class="btn btn-secondary"><svg class="ico" aria-hidden="true"><use href="/images/icons/sprite.svg#arrow-right"></use></svg> Ver todas las tiendas</a>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="section section--alt related-stores">
            <div class="container">
                <div class="section-head"><p class="eyebrow">También te puede interesar</p><h2>Otras tiendas</h2></div>
                <div class="related-stores-grid featured-grid" id="relatedStores"></div>
            </div>
        </section>
    </main>

    <footer class="footer"></footer>
    <button id="backToTop" class="back-to-top" aria-label="Volver arriba">
        <svg class="ico" aria-hidden="true"><use href="/images/icons/sprite.svg#chevron-up"></use></svg>
    </button>

    <script src="/js/components.js"></script>
    <script src="/js/script.js" defer></script>
    <script src="/js/store-detail.js" defer></script>
</body>
</html>

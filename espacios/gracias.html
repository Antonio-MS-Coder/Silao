<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gracias por tu interés | Plaza Real Silao</title>
    <meta name="description" content="Tu solicitud ha sido recibida. Nos pondremos en contacto contigo pronto.">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#FFFFFF">
    <link rel="icon" type="image/png" href="/images/icons/icon-192x192.png">
    <link rel="preload" href="/fonts/jakarta-800.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="stylesheet" href="/css/main.css">
    <style>
      .ty-wrap{min-height:100vh;display:grid;place-items:center;padding:2rem;background:var(--ink)}
      .ty-card{background:#fff;border-radius:var(--r-xl);padding:clamp(2rem,5vw,3rem);max-width:560px;width:100%;text-align:center;box-shadow:var(--shadow-lg)}
      .ty-icon{width:80px;height:80px;border-radius:22px;background:var(--teal);display:grid;place-items:center;margin:0 auto 1.5rem}
      .ty-icon .ico{width:2.4rem;height:2.4rem;color:#fff}
      .ty-info{background:var(--soft);border-radius:var(--r);padding:1.25rem;margin:1.5rem 0;text-align:left}
      .ty-info .row{display:flex;align-items:center;gap:.6rem;color:var(--muted);margin:.4rem 0}
      .ty-info .ico{color:var(--teal);width:1.2rem;height:1.2rem}
      .ty-actions{display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap;margin-top:1.5rem}
    </style>
</head>
<body>
    <div class="ty-wrap">
        <div class="ty-card">
            <div class="ty-icon"><svg class="ico" aria-hidden="true"><use href="/images/icons/sprite.svg#check"></use></svg></div>
            <h1>¡Gracias por tu interés!</h1>
            <p style="color:var(--muted);margin-top:.5rem">Hemos recibido tu solicitud sobre nuestros espacios comerciales. Un ejecutivo de Plaza Real Silao se pondrá en contacto contigo en las próximas 24 horas.</p>
            <div class="ty-info">
                <div class="row"><svg class="ico"><use href="/images/icons/sprite.svg#phone"></use></svg> (55) 7878-9795</div>
                <div class="row"><svg class="ico"><use href="/images/icons/sprite.svg#mail"></use></svg> contacto@plazarealsilao.com</div>
                <div class="row"><svg class="ico"><use href="/images/icons/sprite.svg#clock"></use></svg> Lun-Vie: 9:00 - 18:00</div>
            </div>
            <div class="ty-actions">
                <a href="/" class="btn btn-primary">Volver al inicio</a>
                <a href="/espacios/" class="btn btn-secondary">Ver espacios</a>
            </div>
        </div>
    </div>
    <script>setTimeout(()=>{window.location.href='/';},12000);</script>
</body>
</html>

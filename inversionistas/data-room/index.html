<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Room | Plaza Real Silao</title>
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#33200F">
    <link rel="icon" type="image/png" href="/images/icons/icon-192x192.png">
    <link rel="preload" href="/fonts/fraunces-600.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/fonts/inter-400.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body class="dataroom-body">
    <a href="#main" class="skip-link">Saltar al contenido principal</a>
    <header class="header" id="header"></header>

    <main id="main" class="dataroom-page">
        <section class="dataroom-head">
            <div class="container">
                <div class="dr-head-row">
                    <div>
                        <p class="eyebrow"><svg class="ico"><use href="/images/icons/sprite.svg#lock"></use></svg> Acceso autorizado</p>
                        <h1>Data Room</h1>
                    </div>
                    <div class="dr-viewer-id" id="viewerId" aria-live="polite"></div>
                </div>
                <p class="dr-confidential">Documentos confidenciales · Vista protegida y marcada con tu identidad. Por favor no compartas ni reproduzcas este material.</p>
            </div>
        </section>

        <section class="section dataroom-body-section">
            <div class="container">
                <div class="dataroom-layout">
                    <aside class="dr-sidebar">
                        <h2 class="dr-sidebar-title">Documentos</h2>
                        <ul class="dr-doclist" id="docList"></ul>
                    </aside>
                    <div class="dr-viewer" id="viewer">
                        <div class="dr-empty" id="viewerEmpty">
                            <svg class="ico"><use href="/images/icons/sprite.svg#lock"></use></svg>
                            <p>Selecciona un documento para verlo aquí.</p>
                        </div>
                        <div class="dr-pages" id="pages" hidden></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer"></footer>

    <script src="/js/components.js"></script>
    <script src="/vendor/pdfjs/pdf.min.js"></script>
    <script src="/inversionistas/data-room/viewer.js"></script>
</body>
</html>
